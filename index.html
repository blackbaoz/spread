const SYSTEM = `あなたはSPREAD SNOWBOARDSの板診断AIです。以下のモデル情報を完全に理解した上で、7問の質問を通じてユーザーに最適なモデルを1つ提案してください。

【モデル一覧と特徴】

■ LTA-F
キャンバー / ミドルソフトフレックス
操作性・正確性・軽量性が特徴。センターフレックスをやや抑えめにし、キャンバー高さも控えめに設定。エッジの切り替えが素早く、繊細な動きにも滑らかに反応する高い操作性。ハードなトリックでもストレスなく踏み込める万能モデル。グラトリからカービングまで幅広く対応。

■ AX-F
キャンバー / ミドルソフトフレックス
LTA-Fをベースに有効エッジを延長、フレックスバランスを調整。ターン時の安定感とエッジの噛みが大幅向上。スピンの導入がよりスムーズで初動が軽い。驚異的なスウィングウェイト軽量化でトリックとターン両方レベルアップしたいライダーに最適。弾き・飛び系を含むグラトリに特に向く。

■ LTB
可変キャンバー（SVC）/ ミドルフレックス
安定性・操作性が特徴。ノーズ・テールにフラットゾーンを設け、着地やプレスがしやすい設計。センターキャンバーでオーリー反発を確保しつつ、ルーズでしなやかなライドフィール。プレス・バター系グラトリとオールラウンドに対応。

■ BX
可変キャンバー（SVC）/ ミドルフレックス
LTBをベースに有効エッジ延長、フレックス最適化でターン安定性とエッジグリップ向上。スピン動作の立ち上がりが軽くトリック全般の回しやすさが向上。スウィングウェイト軽量化でボードの振り替え・切り返しが軽快。弾き・飛び系グラトリ向け。

■ BX-F
可変キャンバー（SVC）/ ソフトフレックス
BXをベースにソフトフレックスで軽量化、回転性能が大幅向上。キャンバーの反発と安定性を維持しつつしなやかさをプラス。プレス・バター・回し系のグラトリとの相性が非常によく、軽快でリズムよく滑りたいライダーに最適。

■ DX
ダブルキャンバー（W CAMBER）/ ミドルソフトフレックス
軽量性・操作性が特徴。センター反発とエッジグリップを残しつつ、ノーズ・テールのロッカーがルーズさと自在性をプラス。低速でも扱いやすく、プレスやバターでの板さばきが格段にしやすい。軽快なスタイルを求めるライダーに最適。

■ LTY
可変キャンバー（SVC）/ ミドルフレックス
反発性・正確性・操作性が特徴。今年から可変キャンバー構造を採用。キャンバーの反発力とエッジグリップを維持しながら状況に応じてしなやかに変化。ミディアムフレックスながらノーズ・テールに張りを持たせ高速域でも挙動が安定。スピードを出したカービングからトリックまでスムーズ。ラントリ系・カービングとグラトリの両立向け。

■ LTV
可変キャンバー（SVC）/ ソフトフレックス
反発性・正確性・操作性が特徴。今年から可変キャンバー構造採用。キャンバーの反発力と確かなエッジグリップでターン性能を確保しつつ、センターフレックスをソフトにして足元の自在性を向上。低速から高速、地形遊びまで扱いやすさが向上。

■ ZERO
キャンバー / ミドルフレックス（堀内礼監修）
操作性・正確性が特徴。LTA-Fをベースに有効エッジを延長、スピン性能をより高次元に引き上げ。回転の初動が軽くスムーズで多方向への動きに素直に反応。驚異的なスウィングウェイト軽量化で振り回しや切り返しがより軽快。グラトリから地形遊びまでライダーの表現力を最大限に引き出す。弾き・飛び系グラトリ向けの特別モデル。

キャンバー / ミドルハードフレックス（菅谷佑之介監修）

キャンバー / ハードフレックス（菅谷佑之介監修）
RDと同性能のカラーバリエーションモデル。有効エッジ率81%のラウンド形状。S/W設定なし。142cmはCVモデルのみ。

■ RD GX
キャンバー / ハードフレックス（菅谷佑之介監修）
RDにグラファイトソールを採用し滑走性をさらに強化。雪質変化に左右されにくく高い直進性と加速性能。ハイスピードカービング重視のライダーに最適。

Q7: 体重（kg）※数値で答えてもらう

- 50kg未満 → 145cm
- 50〜59kg → 148cm
- 60〜69kg → 150cm
- 70〜79kg → 152cm
- 80kg以上 → 154cm

カービング → +2cm調整

- グラトリ × プレス系 × キャンバー → LTA-F

- グラトリ × プレス系 × 可変キャンバー × ミドル以上 → LTB
- グラトリ × 弾き飛び系 × 可変キャンバー × ソフト → BX
- グラトリ × 弾き飛び系 × 可変キャンバー × ミドル以上 → LTY
- グラトリ × ダブルキャンバー → DX
- カービング × キャンバー × ハード → RD GX
- カービング × キャンバー × それ以外 → RD
- カービング × こだわりなし → RD
- 両方 × キャンバー → AX-F または LTY
- 両方 × 可変キャンバー → LTY または LTV
- こだわりなし多い → AIが総合判断

【出力形式（厳守）】
質問フェーズ: {"phase":"question","question":"質問文","options":["選択肢A","選択肢B","選択肢C"]}
結果フェーズ: {"phase":"result","model":"モデル名","size":150,"reason":"推薦理由2〜3文","tags":["タグ1","タグ2","タグ3"]}
必ずJSONのみ出力。マークダウン・コードブロック・その他テキスト一切不要。7問終了後に必ず結果を返す。`;

function buildProg(cur, tot, elId) {
  const p = document.getElementById(elId);
  if (!p) return;
  p.innerHTML = '';
  for (let i = 0; i < tot; i++) {
    const d = document.createElement('div');
    d.className = 'pd' + (i === cur ? ' on' : i < cur ? ' done' : '');
    p.appendChild(d);
  }
}

function renderHistory(targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  el.innerHTML = messages.map((m, i) =>
    `<div class="history-item">
      <div class="history-q">Q${i+1} ${m.q}</div>
      <div class="history-a">${m.a}</div>
    </div>`
  ).join('') + (messages.length ? '<div class="divider"></div>' : '');
}

async function callClaude(conv, system, maxTokens = 1000) {
  const res = await fetch('/.netlify/functions/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: maxTokens, system, messages: conv })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || 'APIエラー');
  return data.content.map(b => b.text || '').join('');
}

async function startQuiz() {
  history = []; messages = []; qCount = 0; currentResult = null; chatHistory = [];
  show('screen-loading');
  try {
    const init = [{ role: 'user', content: '診断を始めてください。1問目の質問をお願いします。' }];
    const text = await callClaude(init, SYSTEM);
    const res = JSON.parse(text.replace(/```json|```/g, '').trim());
    history = [...init, { role: 'assistant', content: JSON.stringify(res) }];
    qCount = 1;
    renderQuiz(res);
  } catch(e) {
    alert('通信エラーが発生しました。もう一度お試しください。');
    show('screen-intro');
  }
}

function renderQuiz(data) {
  show('screen-quiz');
  buildProg(qCount - 1, TOTAL_Q, 'prog');
  renderHistory('history-area');
  document.getElementById('divider').classList.toggle('hidden', messages.length === 0);
  document.getElementById('qn').textContent = `Q${qCount} / ${TOTAL_Q}`;
  document.getElementById('qt').textContent = data.question || '';
  const area = document.getElementById('opts');
  area.innerHTML = data.options.map(opt =>
    `<div class="opt" onclick="handleAnswer('${opt.replace(/'/g,"\\'")}',this)">${opt}</div>`
  ).join('');
}

async function handleAnswer(option, el) {
  document.querySelectorAll('.opt').forEach(o => { o.onclick = null; });
  el.classList.add('sel');
  messages.push({ q: document.getElementById('qt').textContent, a: option });
  await new Promise(r => setTimeout(r, 300));
  show('screen-loading');
  buildProg(qCount, TOTAL_Q, 'prog-loading');
  renderHistory('history-area-loading');
  const newHistory = [...history, { role: 'user', content: option }];
  try {
    const text = await callClaude(newHistory, SYSTEM);
    const res = JSON.parse(text.replace(/```json|```/g, '').trim());
    history = [...newHistory, { role: 'assistant', content: JSON.stringify(res) }];
    if (res.phase === 'result') {
      renderResult(res);
    } else {
      qCount++;
      renderQuiz(res);
    }
  } catch(e) {
    alert('通信エラーが発生しました。');
    show('screen-quiz');
  }
}

function renderResult(res) {
  currentResult = res;
  document.getElementById('r-model').textContent = res.model || '';
  document.getElementById('r-size').textContent = res.size ? `RECOMMENDED SIZE : ${res.size}cm` : '';
  document.getElementById('r-reason').textContent = res.reason || '';
  const tags = res.tags || [];
  document.getElementById('r-tags').innerHTML = tags.map(t => `<span class="result-tag">${t}</span>`).join('');

  // AIコメント初期化
  document.getElementById('ai-comment').innerHTML =
    '<div class="ai-comment-loading"><div class="dot-pulse"><span></span><span></span><span></span></div><span>コメント生成中...</span></div>';

  // ライダー
  const riders = RIDERS[res.model] || [];
  const riderWrap = document.getElementById('riders-wrap');
  if (riders.length) {
    document.getElementById('rider-list').innerHTML = riders.map(r =>
      `<a class="rider" href="${r.u}" target="_blank" rel="noopener">
        <div class="rider-icon">${r.n.replace('@','').slice(0,2).toUpperCase()}</div>
        <div class="rider-name">${r.n}</div>
      </a>`
    ).join('');
    riderWrap.classList.remove('hidden');
  } else {
    riderWrap.classList.add('hidden');
  }

  // チャット初期化
  document.getElementById('chat-messages').innerHTML = '';
  chatHistory = [];

  show('screen-result');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // AIコメント非同期生成
  generateAIComment(res);
}

async function generateAIComment(res) {
  const el = document.getElementById('ai-comment');
  const qaLog = messages.map((m, i) => `Q${i+1}: ${m.q} → ${m.a}`).join('\n');
  const system = `あなたはSPREAD SNOWBOARDSのスノーボード専門家です。ユーザーの診断回答をもとに、推奨モデルへの熱量のあるひとことコメントを生成してください。スノーボーダー目線で120〜160文字の自然な日本語で。専門用語OK。`;
  const prompt = `診断結果: ${res.model}\nユーザー回答:\n${qaLog}\n推薦理由: ${res.reason}\nこのユーザーへのコメントを生成してください。`;
  try {
    const comment = await callClaude([{ role: 'user', content: prompt }], system, 400);
    el.textContent = comment.trim();
  } catch(e) {
    el.textContent = `${res.model}はあなたのスタイルに最適な一本です。このボードの特性を最大限に活かして、さらなるライディングを楽しんでください。`;
  }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  sendBtn.style.opacity = '.35';
  sendBtn.style.pointerEvents = 'none';
  const chatArea = document.getElementById('chat-messages');
  const userDiv = document.createElement('div');
  userDiv.className = 'chat-msg user';
  userDiv.textContent = msg;
  chatArea.appendChild(userDiv);
  const loadDiv = document.createElement('div');
  loadDiv.className = 'chat-msg loading';
  loadDiv.innerHTML = '<div class="dot-pulse"><span></span><span></span><span></span></div>';
  chatArea.appendChild(loadDiv);
  chatArea.scrollTop = chatArea.scrollHeight;
  const qaLog = messages.map((m, i) => `Q${i+1}: ${m.q} → ${m.a}`).join('\n');
  const system = `あなたはSPREAD SNOWBOARDSのスノーボード専門家アドバイザーです。診断結果: ${currentResult?.model || ''}。ユーザー回答:\n${qaLog}\n推薦理由: ${currentResult?.reason || ''}\n150文字以内で簡潔に答えてください。マークダウン不要。`;
  chatHistory.push({ role: 'user', content: msg });
  try {
    const reply = await callClaude(chatHistory, system, 400);
    chatHistory.push({ role: 'assistant', content: reply });
    loadDiv.remove();
    const aiDiv = document.createElement('div');
    aiDiv.className = 'chat-msg ai';
    aiDiv.textContent = reply.trim();
    chatArea.appendChild(aiDiv);
  } catch(e) {
    loadDiv.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'chat-msg ai';
    errDiv.textContent = '申し訳ありません、もう一度お試しください。';
    chatArea.appendChild(errDiv);
    chatHistory.pop();
  }
  chatArea.scrollTop = chatArea.scrollHeight;
  sendBtn.style.opacity = '1';
  sendBtn.style.pointerEvents = 'auto';
  input.focus();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChat();
  });
});

function resetQuiz() {
  history = []; messages = []; qCount = 0; currentResult = null; chatHistory = [];
  show('screen-intro');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
