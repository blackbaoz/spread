<script>
const RIDERS = {
  'RD GX':[{n:'@yuhnosuke.sugaya',u:'https://www.instagram.com/yuhnosuke.sugaya'},{n:'@yuichiro_suguro',u:'https://www.instagram.com/yuichiro_suguro'}],
  'RD':[{n:'@sekiya_riku0322',u:'https://www.instagram.com/sekiya_riku0322'},{n:'@satsuka_shiozawa',u:'https://www.instagram.com/satsuka_shiozawa'},{n:'@nagisa_snowbd',u:'https://www.instagram.com/nagisa_snowbd'},{n:'@kuuto.910.sohara',u:'https://www.instagram.com/kuuto.910.sohara'}],
  'RD CV':[{n:'@sekiya_riku0322',u:'https://www.instagram.com/sekiya_riku0322'},{n:'@satsuka_shiozawa',u:'https://www.instagram.com/satsuka_shiozawa'}],
  'ZERO':[{n:'@rei_horiuchi',u:'https://www.instagram.com/rei_horiuchi'}],
  'AX-F':[{n:'@t0rachan.t',u:'https://www.instagram.com/t0rachan.t'}],
  'LTY':[{n:'@jht90310',u:'https://www.instagram.com/jht90310'}],
  'LTV':[{n:'@ju._.bys',u:'https://www.instagram.com/ju._.bys'}],
  'BX':[{n:'@ci_ka_si__95',u:'https://www.instagram.com/ci_ka_si__95'}],
  'BX-F':[{n:'@moooriii9999',u:'https://www.instagram.com/moooriii9999'}],
  'DX':[{n:'@imshige',u:'https://www.instagram.com/imshige'}],
  'LTA-F':[],'LTB':[]
};

const SYSTEM = `あなたはSPREAD SNOWBOARDSの板診断AIです。以下の5問を順番に質問し、回答をもとに最適なモデルを1つ提案してください。身長・体重は別画面で収集し、その後に最終結果を返してください。

【モデル一覧】
LTA-F: キャンバー/ミドルソフト/グラトリ〜カービング万能
AX-F: キャンバー/ミドルソフト/弾き飛び系グラトリ/有効エッジ延長
LTB: 可変キャンバー/ミドル/プレスバター系グラトリ
BX: 可変キャンバー/ミドル/弾き飛び系グラトリ/スピン向上
BX-F: 可変キャンバー/ソフト/プレスバター特化/軽量回転性大幅向上
DX: ダブルキャンバー/ミドルソフト/ルーズ扱いやすさ重視
LTY: 可変キャンバー/ミドル/ラントリ・カービング+グラトリ両立
LTV: 可変キャンバー/ソフト/カービング+グラトリ/反発性
ZERO: キャンバー/ミドル/弾き飛び系特化・堀内礼監修/スピン最高峰
RD: キャンバー/ミドルハード/カービング+トリック両立・菅谷監修
RD CV: キャンバー/ハード/RDカラーバリエーション
RD GX: キャンバー/ハード/RD+グラファイトソール/ハイスピードカービング

【5問（順番厳守）】
Q1: 性別（男性 / 女性 / 回答しない）
Q2: メインスタイル（グラトリ中心 / カービング中心 / 両方やりたい）
Q3: トリックの傾向（プレス・バター系 / 弾き・飛び系 / 両方）※カービング中心ならスキップしQ4へ
Q4: キャンバー形状（キャンバー / 可変キャンバー / ダブルキャンバー / こだわりはない）
Q5: フレックス（ソフト / ミドル / ハード / こだわりはない）

【判定の基本方針】
最優先ルール:
- Q1で「女性」を選んだ場合、最終候補は必ず LTY / LTV / RD のいずれかに限定する
- その中で、回答にカービング要素がある場合は RD を選ぶ
- 女性でカービング要素が無い場合は、柔らかさ・扱いやすさ寄りなら LTV、安定感や反発寄りなら LTY を選ぶ

通常ルール:
グラトリ×プレス×キャンバー→LTA-F
グラトリ×弾き×キャンバー×ミドル以上→ZERO
グラトリ×弾き×キャンバー×ソフト→AX-F
グラトリ×プレス×可変×ソフト→BX-F
グラトリ×プレス×可変×ミドル→LTB
グラトリ×弾き×可変×ソフト→BX
グラトリ×弾き×可変×ミドル→LTY
グラトリ×ダブル→DX
カービング要素あり→RD
カービング中心×ハード→RD GX
カービング中心×それ以外→RD
両方×キャンバー→AX-FまたはLTY
両方×可変→LTYまたはLTV

【サイズ提案ルール】
最終入力で身長(cm)と体重(kg)が与えられたら、モデルだけでなく推奨サイズ(cm)も必ず1つ提案してください。
サイズは体重だけでなく身長・スタイル・トリック傾向・安定感重視か操作性重視かを総合して自然に判断してください。

【進行ルール】
- 5問が終わるまでは質問のみ返す
- 身長・体重がまだ無い段階では結果を返さない
- 身長・体重が与えられたら、そのタイミングで最終結果を返す
- 6問目の質問は作らない

【出力形式（JSONのみ・厳守）】
質問: {"phase":"question","question":"質問文","options":["A","B","C"]}
結果: {"phase":"result","model":"モデル名","size":150,"reason":"推薦理由2〜3文","tags":["タグ1","タグ2","タグ3"]}
`;

let history=[], messages=[], qCount=0, currentResult=null, chatHistory=[];

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildProg(cur,tot,elId){
  const p=document.getElementById(elId); if(!p)return; p.innerHTML='';
  for(let i=0;i<tot;i++){const d=document.createElement('div');d.className='pd'+(i===cur?' on':i<cur?' done':'');p.appendChild(d);}
}

function renderHistory(targetId){
  const el=document.getElementById(targetId); if(!el)return;
  el.innerHTML=messages.map((m,i)=>`<div class="history-item"><div class="history-q">Q${i+1} ${m.q}</div><div class="history-a">${m.a}</div></div>`).join('')+(messages.length?'<div class="divider"></div>':'');
}


function getAnswerByKeyword(keyword){
  const item = messages.find(m => m.q.includes(keyword));
  return item ? item.a : '';
}

function normalizeResult(res){
  if(!res || typeof res !== 'object') return res;
  const gender = getAnswerByKeyword('性別');
  const style = getAnswerByKeyword('メインスタイル');
  const camber = getAnswerByKeyword('キャンバー形状');
  const flex = getAnswerByKeyword('フレックス');

  if(gender === '女性'){
    const hasCarving = (style && (style.includes('カービング') || style.includes('両方')));
    if(hasCarving){
      res.model = 'RD';
    }else{
      const softPreferred = (flex && (flex.includes('ソフト') || flex.includes('こだわりはない')));
      const variablePreferred = (camber && (camber.includes('可変') || camber.includes('こだわりはない')));
      res.model = (softPreferred || variablePreferred) ? 'LTV' : 'LTY';
    }

    if(!Array.isArray(res.tags)) res.tags = [];
    const baseTags = {
      'RD': ['CARVING', 'CONTROL', 'STABILITY'],
      'LTV': ['SOFT FLEX', 'EASY CONTROL', 'FREESTYLE'],
      'LTY': ['BALANCE', 'RESPONSE', 'ALLROUND']
    };
    res.tags = baseTags[res.model];
  }

  return res;
}


async function callClaude(conv, system, maxTokens=800){
  const trimmed=conv.length>8?conv.slice(-8):conv;
  const res=await fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,system,messages:trimmed})});
  const data=await res.json();
  if(!res.ok)throw new Error(data?.error?.message||'APIエラー');
  return data.content.map(b=>b.text||'').join('');
}

async function startQuiz(){
  history=[];messages=[];qCount=0;currentResult=null;chatHistory=[];
  document.getElementById('inp-height').value='';
  document.getElementById('inp-weight').value='';
  document.getElementById('btn-analyze').classList.add('off');
  show('screen-loading');
  document.getElementById('loading-txt').textContent='AI解析中...';
  try{
    const init=[{role:'user',content:'診断を始めてください。Q1の質問をお願いします。'}];
    const text=await callClaude(init,SYSTEM);
    const res=normalizeResult(JSON.parse(text.replace(/```json|```/g,'').trim()));
    history=[...init,{role:'assistant',content:JSON.stringify(res)}];
    qCount=1; renderQuiz(res);
  }catch(e){alert('通信エラーが発生しました。もう一度お試しください。');show('screen-intro');}
}

function renderQuiz(data){
  show('screen-quiz');
  buildProg(qCount-1,6,'prog');
  renderHistory('history-area');
  document.getElementById('divider').classList.toggle('hidden',messages.length===0);
  document.getElementById('qn').textContent=`Q${qCount} / 6`;
  document.getElementById('qt').textContent=data.question||'';
  const area=document.getElementById('opts');
  area.innerHTML=data.options.map(opt=>`<div class="opt" onclick="handleAnswer(this,'${opt.replace(/'/g,"\\'")}')">${opt}</div>`).join('');
}

async function handleAnswer(el,option){
  document.querySelectorAll('.opt').forEach(o=>o.onclick=null);
  el.classList.add('sel');
  messages.push({q:document.getElementById('qt').textContent,a:option});
  await new Promise(r=>setTimeout(r,280));
  if(qCount>=5){
    showBodyScreen();
    return;
  }
  show('screen-loading');
  document.getElementById('loading-txt').textContent='AI解析中...';
  const newHistory=[...history,{role:'user',content:option}];
  try{
    const text=await callClaude(newHistory,SYSTEM);
    const res=normalizeResult(JSON.parse(text.replace(/```json|```/g,'').trim()));
    history=[...newHistory,{role:'assistant',content:JSON.stringify(res)}];
    if(res.phase==='question'){
      qCount++;
      renderQuiz(res);
    } else {
      currentResult=res;
      showBodyScreen();
    }
  }catch(e){alert('通信エラーが発生しました。もう一度お試しください。');show('screen-intro');}
}


function showBodyScreen(){
  show('screen-body');
  const totalSteps = messages.length + 1;
  buildProg(messages.length, totalSteps, 'prog-body');
  renderHistory('history-area-body');
  const qn = document.getElementById('body-qn');
  const qt = document.getElementById('body-qt');
  if(qn) qn.textContent = `Q${messages.length + 1} / ${totalSteps}`;
  if(qt) qt.textContent = '最後に、あなたの身長(cm)と体重(kg)を教えてください。';
  checkBody();
}

function checkBody(){
  const h=parseFloat(document.getElementById('inp-height').value);
  const w=parseFloat(document.getElementById('inp-weight').value);
  const btn=document.getElementById('btn-analyze');
  (h>=140&&h<=210&&w>=30&&w<=150)?btn.classList.remove('off'):btn.classList.add('off');
}

function backFromBody(){show('screen-quiz');}

async function submitBody(){
  const h=parseFloat(document.getElementById('inp-height').value);
  const w=parseFloat(document.getElementById('inp-weight').value);
  if(!(h>=140&&h<=210&&w>=30&&w<=150))return;
  messages = messages.filter(m => m.q !== '身長' && m.q !== '体重');
  messages.push({q:'身長',a:`${h}cm`});
  messages.push({q:'体重',a:`${w}kg`});
  show('screen-loading');
  document.getElementById('loading-txt').textContent='AI解析中...';
  const newHistory=[...history,{role:'user',content:`身長:${h}cm 体重:${w}kg。ここまでの回答を総合して、最適なモデルを1つと推奨サイズ(cm)を1つ、指定のJSON形式で返してください。`}];
  try{
    const text=await callClaude(newHistory,SYSTEM);
    currentResult=normalizeResult(JSON.parse(text.replace(/```json|```/g,'').trim()));
    history=[...newHistory,{role:'assistant',content:JSON.stringify(currentResult)}];
    renderResult(currentResult);
  }catch(e){alert('通信エラーが発生しました。もう一度お試しください。');show('screen-intro');return;}
}


function renderResult(res){
  document.getElementById('r-model').textContent=res.model||'';
  document.getElementById('r-size').textContent=res.size?`RECOMMENDED SIZE : ${res.size}cm`:'';
  document.getElementById('r-reason').textContent=res.reason||'';
  document.getElementById('r-tags').innerHTML=(res.tags||[]).map(t=>`<span class="result-tag">${t}</span>`).join('');
  document.getElementById('ai-comment').innerHTML='<div class="ai-comment-loading"><div class="dot-pulse"><span></span><span></span><span></span></div><span>コメント生成中...</span></div>';
  const riders=RIDERS[res.model]||[];
  const riderWrap=document.getElementById('riders-wrap');
  if(riders.length){
    document.getElementById('rider-list').innerHTML=riders.map(r=>`<a class="rider" href="${r.u}" target="_blank" rel="noopener"><div class="rider-icon">${r.n.replace('@','').slice(0,2).toUpperCase()}</div><div class="rider-name">${r.n}</div></a>`).join('');
    riderWrap.classList.remove('hidden');
  }else{riderWrap.classList.add('hidden');}
  document.getElementById('chat-messages').innerHTML='';
  chatHistory=[];
  show('screen-result');
  window.scrollTo({top:0,behavior:'smooth'});
  generateAIComment(res);
}

async function generateAIComment(res){
  const el=document.getElementById('ai-comment');
  const qaLog=messages.map((m,i)=>`Q${i+1}: ${m.q} → ${m.a}`).join('\n');
  const system=`あなたはSPREAD SNOWBOARDSのスノーボード専門家です。ユーザーの診断回答をもとに、推奨モデルへの熱量のあるコメントを生成してください。スノーボーダー目線で120〜160文字の自然な日本語で。専門用語OK。`;
  const prompt=`診断結果: ${res.model}\nサイズ: ${res.size}cm\nユーザー回答:\n${qaLog}\n推薦理由: ${res.reason}\nコメントを生成してください。`;
  try{
    const comment=await callClaude([{role:'user',content:prompt}],system,400);
    el.textContent=comment.trim();
  }catch(e){
    el.textContent=`${res.model}はあなたのスタイルに最適な一本です。このボードの特性を最大限に活かして、さらなるライディングを楽しんでください。`;
  }
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const sendBtn=document.getElementById('chat-send');
  const msg=input.value.trim();
  if(!msg||sendBtn.disabled)return;
  input.value=''; sendBtn.disabled=true;
  const chatArea=document.getElementById('chat-messages');
  const userDiv=document.createElement('div'); userDiv.className='chat-msg user'; userDiv.textContent=msg; chatArea.appendChild(userDiv);
  const loadDiv=document.createElement('div'); loadDiv.className='chat-msg loading'; loadDiv.innerHTML='<div class="dot-pulse"><span></span><span></span><span></span></div>'; chatArea.appendChild(loadDiv);
  chatArea.scrollTop=chatArea.scrollHeight;
  const qaLog=messages.map((m,i)=>`Q${i+1}: ${m.q} → ${m.a}`).join('\n');
  const system=`あなたはSPREAD SNOWBOARDSのスノーボード専門家アドバイザーです。診断結果: ${currentResult?.model||''}。推薦理由: ${currentResult?.reason||''}\nユーザー回答:\n${qaLog}\n150文字以内で簡潔に答えてください。マークダウン不要。`;
  const trimmedChat=chatHistory.length>6?chatHistory.slice(-6):[...chatHistory];
  trimmedChat.push({role:'user',content:msg});
  try{
    const reply=await callClaude(trimmedChat,system,400);
    chatHistory.push({role:'user',content:msg}); chatHistory.push({role:'assistant',content:reply});
    loadDiv.remove();
    const aiDiv=document.createElement('div'); aiDiv.className='chat-msg ai'; aiDiv.textContent=reply.trim(); chatArea.appendChild(aiDiv);
  }catch(e){
    loadDiv.remove();
    const errDiv=document.createElement('div'); errDiv.className='chat-msg ai'; errDiv.textContent='申し訳ありません、もう一度お試しください。'; chatArea.appendChild(errDiv);
  }
  chatArea.scrollTop=chatArea.scrollHeight; sendBtn.disabled=false; input.focus();
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
  ['inp-height','inp-weight'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      el.addEventListener('keydown',e=>{
        if(e.key==='Enter' && !document.getElementById('btn-analyze').classList.contains('off')) submitBody();
      });
    }
  });
});

function resetQuiz(){
  history=[];messages=[];qCount=0;currentResult=null;chatHistory=[];
  document.getElementById('inp-height').value='';
  document.getElementById('inp-weight').value='';
  document.getElementById('btn-analyze').classList.add('off');
  show('screen-intro');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
